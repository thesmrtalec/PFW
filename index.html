<style>
  :root {
    --paper:#f5f6f8; --card:#ffffff; --ink:#1c2430; --deep:#22304a;
    --rule:#d6dae1; --muted:#6b7688; --faint:#9aa3b2;
    --accent:#3f6f6f; --accent-soft:#e6efee; --confirmed:#2f7d54; --confirmed-soft:#e7f1ec;
    --shadow:0 1px 3px rgba(28,36,48,.08), 0 1px 2px rgba(28,36,48,.04);
    --serif:'Spectral', Georgia, serif;
    --sans:-apple-system, system-ui, "Segoe UI", Roboto, sans-serif;
    --mono:ui-monospace, "SF Mono", Menlo, monospace;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin:0; padding:0; }
  body {
    background: var(--paper); color: var(--ink); font-family: var(--sans);
    font-size: 16px; line-height: 1.5;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .wrap { max-width: 620px; margin: 0 auto; padding: 20px 18px 80px; }

  .top { text-align: center; padding: 8px 0 18px; border-bottom: 2px solid var(--deep); margin-bottom: 22px; }
  .top h1 { font-family: var(--serif); font-weight: 600; font-size: 27px; letter-spacing: .01em; color: var(--deep); margin: 0; }
  .top .sub { font-family: var(--mono); font-size: 10.5px; letter-spacing: .22em; text-transform: uppercase; color: var(--muted); margin-top: 5px; }

  button { font-family: var(--sans); cursor: pointer; }
  .btn { background: var(--deep); color: #fff; border: none; border-radius: 9px; padding: 12px 18px; font-size: 15px; font-weight: 600; }
  .btn:active { opacity: .9; }
  .btn-ghost { background: transparent; color: var(--accent); border: 1px solid var(--rule); border-radius: 9px; padding: 11px 16px; font-size: 14px; font-weight: 500; }
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }

  .list-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 14px; }
  .list-head .eyebrow { font-family: var(--mono); font-size: 11px; letter-spacing: .16em; text-transform: uppercase; color: var(--muted); }
  .week-card { background: var(--card); border: 1px solid var(--rule); border-radius: 12px; padding: 15px 16px; margin-bottom: 11px; box-shadow: var(--shadow); display: flex; align-items: center; gap: 14px; cursor: pointer; }
  .week-card:active { border-color: var(--accent); }
  .week-when { flex: 1; }
  .week-date { font-family: var(--serif); font-size: 18px; font-weight: 600; color: var(--deep); }
  .week-meta { font-size: 13px; color: var(--muted); margin-top: 2px; }
  .week-tag { font-family: var(--mono); font-size: 10px; letter-spacing: .1em; text-transform: uppercase; padding: 3px 8px; border-radius: 999px; background: var(--accent-soft); color: var(--accent); }
  .week-tag.past { background: #eceef1; color: var(--faint); }
  .empty { text-align: center; color: var(--muted); padding: 40px 20px; font-family: var(--serif); font-style: italic; font-size: 17px; }

  /* archive */
  .archive-toggle { display: flex; align-items: center; gap: 8px; width: 100%; background: transparent; border: none; padding: 14px 4px 10px; margin-top: 8px; color: var(--muted); font-family: var(--mono); font-size: 11px; letter-spacing: .12em; text-transform: uppercase; }
  .archive-toggle .arch-chev { transition: transform .18s; font-size: 10px; }
  .archive-toggle.open .arch-chev { transform: rotate(90deg); }
  .archive-toggle .arch-count { color: var(--faint); }
  .archive-toggle .arch-line { flex: 1; height: 1px; background: var(--rule); }
  .archive-body { display: none; }
  .archive-body.open { display: block; }
  .archive-body .week-card { opacity: .72; }

  .back-link { background: transparent; border: none; color: var(--accent); font-size: 15px; padding: 0; margin-bottom: 14px; font-weight: 500; }
  .zone { background: var(--card); border: 1px solid var(--rule); border-radius: 14px; padding: 4px 16px 14px; margin-bottom: 18px; box-shadow: var(--shadow); }
  .zone-head { display: flex; align-items: center; gap: 10px; padding: 14px 0 6px; border-bottom: 1px solid var(--rule); margin-bottom: 10px; }
  .zone-head h2 { font-family: var(--serif); font-size: 19px; font-weight: 600; color: var(--deep); margin: 0; flex: 1; }
  .zone-head .who { font-family: var(--mono); font-size: 9.5px; letter-spacing: .1em; text-transform: uppercase; color: var(--faint); }
  .zone-badge { font-family: var(--mono); font-size: 9.5px; letter-spacing: .12em; text-transform: uppercase; padding: 3px 8px; border-radius: 5px; }
  .badge-public { background: var(--accent-soft); color: var(--accent); }
  .badge-private { background: #f0e9ef; color: #7a4f74; }
  .sub-label { font-family: var(--mono); font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); margin: 14px 0 6px; padding-top: 12px; border-top: 1px dashed var(--rule); }
  .bm-chip { display: inline-block; margin-top: 5px; font-family: var(--sans); font-size: 13px; color: var(--accent); background: var(--accent-soft); border: 1px solid var(--accent); border-radius: 6px; padding: 4px 9px; cursor: pointer; }
  .bm-chip::before { content: "\2192 "; opacity: .6; }
  .sent-bar { display: flex; align-items: center; gap: 8px; margin: 10px auto 0; max-width: 520px; padding: 9px 13px; border-radius: 10px; background: var(--card); border: 1px dashed var(--rule); font-size: 13px; color: var(--muted); }
  .sent-bar.is-sent { border-style: solid; border-color: var(--confirmed); background: var(--confirmed-soft); color: var(--confirmed); }
  .sent-bar .sent-txt { flex: 1; }
  .sent-bar .sent-dot { font-weight: 800; }
  .sent-bar .sent-mark { background: var(--deep); color: #fff; border: none; border-radius: 7px; padding: 7px 13px; font-size: 13px; font-weight: 600; }
  .sent-bar .sent-undo { background: transparent; border: none; color: var(--confirmed); font-size: 12px; text-decoration: underline; }
  .week-tag.sent-tag { background: var(--confirmed-soft); color: var(--confirmed); }

  .field { margin-bottom: 12px; }
  .field:last-child { margin-bottom: 4px; }
  .field label { display: block; font-family: var(--mono); font-size: 10.5px; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }
  .field input, .field textarea, .field select {
    width: 100%; box-sizing: border-box; font-family: var(--sans); font-size: 16px;
    border: 1px solid var(--rule); border-radius: 8px; padding: 10px 12px; background: #fff; color: var(--ink);
    -webkit-appearance: none; appearance: none;
  }
  .field input:focus, .field textarea:focus, .field select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .field textarea { resize: vertical; min-height: 62px; line-height: 1.45; }
  .field .hint { font-size: 12px; color: var(--faint); margin-top: 4px; font-style: italic; }

  .speaker-row { border: 1px solid var(--rule); border-radius: 10px; padding: 10px 12px; margin-bottom: 10px; background: #fbfcfd; }
  .speaker-row .sp-name { margin-bottom: 8px; }
  .sp-topic label { color: var(--accent); }

  /* toggle switch (Fast & Testimony) */
  .toggle { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; cursor: pointer; user-select: none; }
  .toggle .tg-track { position: relative; width: 44px; height: 26px; border-radius: 999px; background: var(--rule); transition: background .18s; flex: 0 0 auto; }
  .toggle .tg-knob { position: absolute; top: 3px; left: 3px; width: 20px; height: 20px; border-radius: 50%; background: #fff; box-shadow: 0 1px 2px rgba(0,0,0,.2); transition: transform .18s; }
  .toggle.on .tg-track { background: var(--accent); }
  .toggle.on .tg-knob { transform: translateX(18px); }
  .toggle .tg-label { font-size: 14.5px; font-weight: 600; color: var(--ink); }
  .toggle.on .tg-label { color: var(--accent); }

  .add-line { background: transparent; border: 1px dashed var(--rule); color: var(--muted); border-radius: 8px; padding: 8px 12px; font-size: 13px; font-family: var(--mono); width: 100%; margin-top: 2px; }
  .add-line:active { border-color: var(--accent); color: var(--accent); }

  .out-bar { position: sticky; bottom: 0; background: linear-gradient(to top, var(--paper) 65%, transparent); padding: 14px 0 6px; margin-top: 8px; display: flex; gap: 10px; }
  .out-bar .btn { flex: 1; }
  .out-bar .btn.secondary { background: var(--accent); }

  .danger { background: transparent; border: none; color: #a3453a; font-size: 13px; margin-top: 6px; padding: 6px; }

  /* hymn field trigger */
  .hymn-trigger {
    width: 100%; box-sizing: border-box; text-align: left; font-family: var(--sans);
    font-size: 16px; border: 1px solid var(--rule); border-radius: 8px;
    padding: 10px 12px; background: #fff; color: var(--ink); cursor: pointer;
    display: flex; align-items: center; gap: 8px; min-height: 42px;
  }
  .hymn-trigger:active { border-color: var(--accent); }
  .hymn-trigger .ht-val { flex: 1; }
  .hymn-trigger.empty .ht-val { color: var(--faint); font-style: italic; }
  .hymn-trigger .ht-clear { color: var(--faint); font-size: 20px; line-height: 1; padding: 0 4px; }
  .hymn-trigger .ht-chev { color: var(--faint); font-size: 13px; }

  .hp-overlay { position: fixed; inset: 0; background: rgba(28,36,48,.4); z-index: 200; display: none; align-items: flex-end; }
  .hp-overlay.open { display: flex; }
  .hp-panel {
    background: var(--paper); width: 100%; max-width: 620px; margin: 0 auto;
    border-radius: 16px 16px 0 0; max-height: 88vh; display: flex; flex-direction: column;
    box-shadow: 0 -4px 24px rgba(28,36,48,.18); padding-bottom: env(safe-area-inset-bottom);
  }
  .hp-head { padding: 14px 16px 10px; border-bottom: 1px solid var(--rule); }
  .hp-title { font-family: var(--serif); font-size: 17px; font-weight: 600; color: var(--deep); margin-bottom: 10px; text-align: center; }
  .hp-search {
    width: 100%; box-sizing: border-box; font-family: var(--sans); font-size: 16px;
    border: 1px solid var(--rule); border-radius: 9px; padding: 11px 13px; background: #fff; color: var(--ink);
    -webkit-appearance: none; appearance: none;
  }
  .hp-search:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .hp-tabs { display: flex; gap: 6px; margin-top: 10px; }
  .hp-tab { flex: 1; text-align: center; font-family: var(--mono); font-size: 11px; letter-spacing: .06em; text-transform: uppercase; padding: 7px 4px; border-radius: 7px; border: 1px solid var(--rule); background: #fff; color: var(--muted); }
  .hp-tab.active { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); font-weight: 600; }
  .hp-list { overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 6px 0 8px; }
  .hp-row { display: flex; align-items: baseline; gap: 12px; padding: 11px 16px; cursor: pointer; border-bottom: 1px solid #eef0f3; }
  .hp-row:active { background: var(--accent-soft); }
  .hp-num { font-family: var(--mono); font-size: 13px; font-weight: 600; color: var(--accent); min-width: 44px; flex: 0 0 auto; }
  .hp-name { flex: 1; font-size: 15px; color: var(--ink); }
  .hp-empty { text-align: center; color: var(--muted); font-family: var(--serif); font-style: italic; padding: 30px 16px; }
  .hp-cancel { border-top: 1px solid var(--rule); text-align: center; padding: 13px; color: var(--accent); font-weight: 600; font-size: 15px; background: #fff; }

  /* output */
  .sheet-overlay { position: fixed; inset: 0; background: var(--paper); z-index: 100; overflow-y: auto; display: none; }
  .sheet-overlay.open { display: block; }
  .sheet-toolbar { position: sticky; top: 0; background: #fff; border-bottom: 1px solid var(--rule); padding: 12px 16px; display: flex; gap: 10px; align-items: center; z-index: 2; }
  .sheet-toolbar .btn { padding: 9px 16px; }
  .sheet-toolbar .close { background: transparent; border: none; color: var(--muted); font-size: 15px; flex: 1; text-align: left; padding: 0; }
  .sheet-scroll { padding: 22px 16px 60px; }

  /* swipeable pair (conducting = program + brief) */
  .pair-track { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; gap: 0; scrollbar-width: none; }
  .pair-track::-webkit-scrollbar { display: none; }
  .pair-page { flex: 0 0 100%; scroll-snap-align: center; display: flex; justify-content: center; padding: 0 4px; box-sizing: border-box; }
  .pair-dots { display: flex; justify-content: center; gap: 8px; margin: 14px 0 2px; }
  .pair-dot { width: 8px; height: 8px; border-radius: 999px; background: var(--rule); transition: background .2s, width .2s; }
  .pair-dot.active { background: var(--accent); width: 20px; }
  .pair-label { text-align: center; font-family: var(--mono); font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
  #printFlat { display: none; }

  .doc { max-width: 680px; margin: 0 auto; background: #fff; border: 1px solid var(--rule); border-radius: 6px; padding: 36px 40px; box-shadow: var(--shadow); }
  .doc h1 { font-family: var(--serif); text-align: center; font-size: 22px; font-weight: 600; color: var(--ink); margin: 0 0 2px; line-height: 1.25; }
  .doc .doc-ward { font-family: var(--serif); text-align: center; font-size: 16px; color: var(--ink); margin: 0; }
  .doc .doc-date { text-align: center; font-family: var(--mono); font-size: 12px; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); margin: 8px 0 22px; }
  .doc .rule { border: none; border-top: 1px solid var(--rule); margin: 18px 0; }
  .doc-line { padding: 6px 0; font-size: 15px; line-height: 1.4; }
  .doc-line .dl-label { font-weight: 600; color: var(--deep); display: inline; }
  .doc-line .dl-label::after { content: ":"; }
  .doc-line .dl-val { color: var(--ink); }
  /* short labels stay inline; long ones (wider than the column) wrap the value under, indented */
  .doc-line.inline { display: flex; gap: 10px; align-items: baseline; }
  .doc-line.inline .dl-label { flex: 0 0 145px; }
  .doc-line.inline .dl-label::after { content: ""; }
  .doc-line.inline .dl-val { flex: 1; }
  .doc-line.stacked .dl-val { display: block; margin-top: 2px; padding-left: 2px; }
  .doc-section-title { font-family: var(--mono); font-size: 11px; letter-spacing: .16em; text-transform: uppercase; color: var(--accent); margin: 20px 0 8px; font-weight: 600; }
  .doc-note { font-size: 13px; color: var(--muted); font-style: italic; }

  /* ---- conducting sheet ---- */
  .cs { max-width: 680px; margin: 0 auto; }
  .cs-title { text-align: center; font-family: var(--sans); font-size: 21px; font-weight: 800; letter-spacing: .01em; color: #111; margin: 0; }
  .cs-sub { text-align: center; font-family: var(--sans); font-size: 12px; font-weight: 600; letter-spacing: .04em; color: #444; margin: 3px 0 0; }
  .cs-date { text-align: center; font-family: var(--sans); font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: #888; margin: 4px 0 18px; }
  .cs-sub-lg { font-size: 17px; margin-top: 4px; color: #222; }
  .cs-date-lg { font-size: 13px; margin: 5px 0 20px; }

  .cs-sec { margin: 0 0 14px; }
  .cs-h { font-family: var(--sans); font-size: 11px; font-weight: 800; letter-spacing: .12em; text-transform: uppercase; color: #111; margin: 0 0 4px; }
  .cs-hrule { border: none; border-top: 2px solid #111; margin: 0 0 8px; }

  /* run-of-show rows */
  .cs-row { display: flex; align-items: baseline; gap: 10px; padding: 4px 0; font-size: 15px; line-height: 1.35; }
  .cs-row .cs-label { font-weight: 700; color: #111; flex: 0 0 152px; }
  .cs-row .cs-val { flex: 1; color: #1c2430; }
  .cs-row .cs-topic { color: #666; font-style: italic; }
  .cs-row.dim .cs-val { color: #999; }

  /* verbatim vote callouts */
  .cs-say { border-left: 3px solid #111; background: #f6f7f9; padding: 8px 12px; margin: 7px 0; font-size: 14.5px; line-height: 1.5; }
  .cs-say .cs-cue { display: block; font-family: var(--sans); font-size: 10px; font-weight: 800; letter-spacing: .1em; text-transform: uppercase; color: #666; margin-bottom: 3px; }
  .cs-say .cs-names { font-weight: 700; color: #111; }
  .cs-say .cs-quote { color: #1c2430; }
  .cs-say .cs-quote + .cs-checkline { margin-top: 5px; }
  .cs-say .cs-checkline + .cs-quote { margin-top: 6px; }
  .cs-note { font-size: 13px; color: #666; margin: 3px 0; }
  .cs-mission-h { font-family: var(--sans); font-size: 12px; font-weight: 700; color: #1c2430; margin: 8px 0 3px; }
  .cs-caption { font-family: var(--sans); font-size: 10.5px; font-style: italic; letter-spacing: .02em; color: #999; margin: -2px 0 5px; }
  /* lines added after the agenda was locked ("sent") \u2014 flagged on reprint */
  .cs-checkline.is-new, .cs-checkline.is-new *, .cs-row.is-new, .cs-row.is-new *, .cs-note.is-new { font-style: italic !important; color: #8a8a8a !important; }
  .cs-checkline.is-new .cs-box { color: #b0b0b0 !important; }
  .cs-checkline.is-new::after { content: " \00b7 added"; font-size: 9px; font-style: normal; letter-spacing: .08em; text-transform: uppercase; color: #b0b0b0; vertical-align: 1px; }
  .cs-checkline { display: flex; gap: 8px; padding: 3px 0; font-size: 14.5px; }
  .cs-checkline .cs-box { color: #111; font-weight: 700; }

  /* ---- login ---- */
  .login-wrap { max-width: 380px; margin: 8vh auto 0; padding: 0 20px; text-align: center; }
  .login-logo { font-family: var(--serif); font-size: 30px; font-weight: 600; color: var(--deep); margin: 0; }
  .login-sub { font-family: var(--mono); font-size: 10.5px; letter-spacing: .22em; text-transform: uppercase; color: var(--muted); margin: 5px 0 28px; }
  .login-card { background: var(--card); border: 1px solid var(--rule); border-radius: 14px; padding: 22px 20px; box-shadow: var(--shadow); text-align: left; }
  .login-card label { display: block; font-family: var(--mono); font-size: 10.5px; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin: 12px 0 5px; }
  .login-card label:first-child { margin-top: 0; }
  .login-card input { width: 100%; box-sizing: border-box; font-size: 16px; border: 1px solid var(--rule); border-radius: 8px; padding: 11px 12px; -webkit-appearance: none; }
  .login-card input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .login-btn { width: 100%; margin-top: 18px; background: var(--deep); color: #fff; border: none; border-radius: 9px; padding: 13px; font-size: 15px; font-weight: 600; }
  .login-msg { font-size: 13px; margin-top: 14px; text-align: center; min-height: 18px; }
  .login-msg.err { color: #a3453a; }
  .login-msg.ok { color: var(--confirmed); }
  .login-config-warn { background: #faf3e6; border: 1px solid #e8d9b8; color: #8a6d3b; font-size: 12.5px; border-radius: 8px; padding: 10px 12px; margin-bottom: 16px; line-height: 1.45; }

  /* sync status pill */
  .sync-pill { position: fixed; top: calc(env(safe-area-inset-top) + 8px); right: 12px; font-family: var(--mono); font-size: 9.5px; letter-spacing: .08em; text-transform: uppercase; padding: 4px 9px; border-radius: 999px; z-index: 150; transition: opacity .3s; }
  .sync-pill.saving { background: #faf3e6; color: #b08948; }
  .sync-pill.saved { background: var(--confirmed-soft); color: var(--confirmed); }
  .sync-pill.error { background: #f6e5e2; color: #a3453a; }
  .sync-pill.hidden { opacity: 0; pointer-events: none; }
  .signout-link { display: block; text-align: center; margin: 20px auto 0; background: none; border: none; color: var(--faint); font-size: 12.5px; }

  /* ---- tab bar ---- */
  .tabs { display: flex; gap: 4px; max-width: 620px; margin: 0 auto 18px; padding: 4px; background: #eceef1; border-radius: 11px; }
  .tabs .tab { flex: 1; text-align: center; font-family: var(--sans); font-size: 13.5px; font-weight: 600; padding: 9px 6px; border-radius: 8px; border: none; background: transparent; color: var(--muted); }
  .tabs .tab.active { background: #fff; color: var(--deep); box-shadow: var(--shadow); }

  /* ---- assignments ---- */
  .asg { border: 1px solid var(--rule); border-radius: 10px; padding: 10px 12px; margin-bottom: 9px; background: #fbfcfd; display: flex; gap: 10px; align-items: flex-start; }
  .asg.done { opacity: .55; }
  .asg .asg-check { flex: 0 0 auto; width: 24px; height: 24px; border-radius: 6px; border: 1.5px solid var(--rule); background: #fff; display: flex; align-items: center; justify-content: center; font-size: 15px; color: var(--confirmed); cursor: pointer; margin-top: 1px; }
  .asg.done .asg-check { background: var(--confirmed-soft); border-color: var(--confirmed); }
  .asg .asg-body { flex: 1; min-width: 0; }
  .asg .asg-what { font-size: 15px; color: var(--ink); line-height: 1.35; }
  .asg.done .asg-what { text-decoration: line-through; }
  .asg .asg-meta { font-size: 12px; color: var(--faint); margin-top: 3px; }
  .asg .asg-who { font-weight: 600; color: var(--accent); }
  .asg .asg-del { flex: 0 0 auto; color: var(--faint); font-size: 18px; padding: 0 2px; cursor: pointer; }
  .asg-carry { font-family: var(--mono); font-size: 9px; letter-spacing: .08em; text-transform: uppercase; color: #b08948; background: #faf3e6; padding: 1px 6px; border-radius: 4px; margin-left: 6px; }
  .asg-add { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 4px; }
  @media (max-width: 460px) { .asg-add { grid-template-columns: 1fr; } }
  .asg-add-full { grid-column: 1 / -1; }

  .counsel-row { border: 1px solid var(--rule); border-radius: 8px; padding: 8px 10px; margin-bottom: 8px; background: #fbfcfd; }

  /* follow-up sheet: per-person blocks */
  .fu-person { margin: 0 0 14px; }
  .fu-name { font-family: var(--sans); font-size: 15px; font-weight: 800; color: #111; margin: 0 0 4px; }
  .fu-item { display: flex; gap: 8px; padding: 3px 0; font-size: 14.5px; line-height: 1.4; }
  .fu-item .fu-box { color: #111; font-weight: 700; flex: 0 0 auto; }
  .fu-item .fu-new { font-family: var(--sans); font-size: 9px; font-weight: 800; letter-spacing: .06em; text-transform: uppercase; color: var(--accent); background: var(--accent-soft); padding: 1px 5px; border-radius: 4px; margin-left: 4px; }

  @media print {
    html, body { background: #fff !important; height: auto !important; }
    /* hide everything except the sheet overlay content */
    .sync-pill, .sheet-toolbar, .wrap, .hp-overlay { display: none !important; }
    .sheet-overlay {
      position: static !important; background: #fff !important;
      overflow: visible !important; height: auto !important; min-height: 0 !important; display: block !important;
    }
    .sheet-scroll { padding: 0 !important; overflow: visible !important; height: auto !important; }
    .doc { border: none !important; box-shadow: none !important; border-radius: 0; padding: 0.5in 0.6in; max-width: none !important; margin: 0 !important; background: #fff !important; }
    /* Compress the agenda's vertical rhythm in print so a normal week's agenda
       collapses onto one page instead of spilling a mostly-empty second sheet.
       (Only affects the single-doc sheets; the flat pair path has its own.) */
    #sheetDoc .cs-title { margin: 0 0 1px !important; }
    #sheetDoc .cs-sub { margin: 0 !important; }
    #sheetDoc .cs-date { margin: 3px 0 12px !important; }
    #sheetDoc .cs-sec { margin: 0 0 9px !important; }
    #sheetDoc .cs-hrule { margin: 0 0 5px !important; }
    #sheetDoc .cs-checkline { padding: 2px 0 !important; }
    #sheetDoc .cs-note { margin: 2px 0 !important; }
    #sheetDoc .cs-mission-h { margin: 6px 0 2px !important; }
    #sheetDoc .cs-caption { margin: -1px 0 4px !important; }
    /* Keep atomic units together (a single row, a vote box, a checkline) but
       let a long SECTION flow across a page boundary rather than jumping the
       whole thing to the next page and leaving a blank gap. Also keep a section
       heading attached to the content that follows it. */
    .cs-say, .cs-row, .cs-checkline, .cs-mission-h { page-break-inside: avoid; break-inside: avoid; }
    .cs-h, .cs-mission-h { page-break-after: avoid; break-after: avoid; }
    /* single-doc view: no forced breaks, collapse to content */
    #sheetDoc { height: auto !important; min-height: 0 !important; }
    /* swipe pair -> stacked full pages, one per sheet.
       iOS Safari keeps flex/scroll width unless we hard-reset every property,
       which otherwise renders a 200%-wide scroll area and spills a blank page. */
    .pair-track {
      display: block !important; overflow: visible !important; overflow-x: visible !important;
      height: auto !important; width: auto !important; max-width: 100% !important;
      scroll-snap-type: none !important; white-space: normal !important;
    }
    .pair-page {
      display: block !important; float: none !important;
      flex: none !important; width: 100% !important; max-width: 100% !important;
      padding: 0 !important; margin: 0 !important;
      scroll-snap-align: none !important; box-sizing: border-box !important;
    }
    /* break BEFORE the 2nd page only; nothing forces a break after the last */
    .pair-page + .pair-page { page-break-before: always; break-before: page; }
    .pair-dots, .pair-label { display: none !important; height: 0 !important; margin: 0 !important; padding: 0 !important; }

    /* flattened print container (used for the pair view) */
    #printFlat { display: block; }
    .print-flat-page { break-inside: auto; page-break-inside: auto; }
    /* keep individual sections intact when a page must break */
    .print-flat-page .cs-sec, .print-flat-page .cs-say,
    .print-flat-page .doc-line { break-inside: avoid; page-break-inside: avoid; }
    /* force a break BEFORE every page except the first; never after */
    .print-flat-page + .print-flat-page { page-break-before: always; break-before: page; }
    .print-flat-page:last-child { page-break-after: avoid; break-after: avoid; }
    .print-flat-page .doc { border: none !important; box-shadow: none !important; padding: 0.5in 0.6in !important; margin: 0 !important; max-width: none !important; background: #fff !important; }
    /* a trailing bottom-margin on the last block can round up onto a new sheet */
    .print-flat-page .doc > *:last-child { margin-bottom: 0 !important; }
    /* conducting brief runs slightly over one sheet; compress its vertical
       rhythm in print so Announcements + Business + Sacrament fit on page 2 */
    .print-flat-page .cs-date-lg { margin: 4px 0 12px !important; }
    .print-flat-page .cs-sec { margin: 0 0 9px !important; }
    .print-flat-page .cs-hrule { margin: 0 0 6px !important; }
    .print-flat-page .cs-say { margin: 5px 0 !important; padding: 6px 10px !important; line-height: 1.4 !important; }
    .print-flat-page .cs-checkline { padding: 2px 0 !important; }
    .print-flat-page .cs-say .cs-quote + .cs-checkline { margin-top: 3px !important; }
    .print-flat-page .cs-say .cs-checkline + .cs-quote { margin-top: 4px !important; }
    /* When flat mode is active, hide the ENTIRE live tree; only #printFlat prints.
       Anything left in normal flow (the empty overlay, an over-tall scroll box)
       is what iOS was paginating into a trailing blank sheet. */
    body.printing-flat > *:not(#printFlat) { display: none !important; }
    @page { margin: 0; }
  }
</style>

  function el(tag, cls, text) {
    var e = document.createElement(tag);
    if (cls) e.className = cls;
    if (text != null) e.textContent = text;
    return e;
  }

  // ---------- autofill + gentle formatting ----------
  // Gentle Title Case: capitalize a word ONLY if it's all-lowercase.
  // Leaves LaTannise, McKay, DeConcini, all-caps, etc. untouched.
  function gentleName(s) {
    s = (s || "").replace(/\s+/g, " ").trim();
    if (!s) return s;
    return s.split(" ").map(function (w) {
      if (!w) return w;
      // if the word already has any uppercase letter, don't touch it
      if (/[A-Z]/.test(w)) return w;
      // handle hyphenated / apostrophe pieces: capitalize each sub-part's first letter
      return w.replace(/([a-z])([a-z']*)/g, function (m, a, b) { return a.toUpperCase() + b; });
    }).join(" ");
  }
  // Callings: safe Title Case, but keep small connector words lowercase mid-phrase.
  function formatCalling(s) {
    s = (s || "").replace(/\s+/g, " ").trim();
    if (!s) return s;
    var small = { "of": 1, "the": 1, "and": 1, "to": 1, "in": 1, "for": 1, "a": 1 };
    var words = s.split(" ");
    return words.map(function (w, i) {
      if (/[A-Z]/.test(w)) return w; // leave intentional caps alone
      var lower = w.toLowerCase();
      if (i > 0 && small[lower]) return lower;
      return w.replace(/([a-z])([a-z']*)/g, function (m, a, b) { return a.toUpperCase() + b; });
    }).join(" ");
  }

  // Harvest distinct names / callings from everything already entered.
  function harvestSuggestions() {
    var names = {}, callings = {}, assignees = {}, councilAssignees = {};
    function addName(v) { v = (v || "").trim(); if (v) names[v] = 1; }
    function addCalling(v) { v = (v || "").trim(); if (v) callings[v] = 1; }
    function addAssignee(v) { v = (v || "").trim(); if (v) assignees[v] = 1; }
    function addCouncilAssignee(v) { v = (v || "").trim(); if (v) councilAssignees[v] = 1; }
    (state.weeks || []).forEach(function (w) {
      (w.speakers || []).forEach(function (s) { addName(s.name); });
      addName(w.youthSpeaker);
      (w.releases || []).forEach(function (r) { addName(r.name); addCalling(r.calling); });
      (w.callings || []).forEach(function (r) { addName(r.name); addCalling(r.calling); });
    });
    (state.bishopric || []).forEach(function (m) {
      (m.counsel || []).forEach(function (c) { addName(c.name); });
      (m.callings || []).forEach(function (c) { addName(c.name); addCalling(c.calling); });
    });
    (state.council || []).forEach(function (m) {
      (m.counsel || []).forEach(function (c) { addName(c.name); });
    });
    // Assignees are a small, closed set (the bishopric / council + a few
    // helpers). Keep their suggestions SEPARATE from the general name pool and
    // from each other so each field only offers people actually assigned there.
    (state.assignments || []).forEach(function (a) { addAssignee(a.who); });
    (state.councilAssignments || []).forEach(function (a) { addCouncilAssignee(a.who); });
    return {
      names: Object.keys(names).sort(function (a, b) { return a.localeCompare(b); }),
      callings: Object.keys(callings).sort(function (a, b) { return a.localeCompare(b); }),
      assignees: Object.keys(assignees).sort(function (a, b) { return a.localeCompare(b); }),
      councilAssignees: Object.keys(councilAssignees).sort(function (a, b) { return a.localeCompare(b); })
    };
  }
  // Populate the shared <datalist> elements from current data.
  function refreshDatalists() {
    var s = harvestSuggestions();
    fillList("dl-names", s.names);
    fillList("dl-callings", s.callings);
    fillList("dl-assignees", s.assignees);
    fillList("dl-council-assignees", s.councilAssignees);
  }
  function fillList(id, items) {
    var dl = document.getElementById(id);
    if (!dl) return;
    dl.innerHTML = "";
    items.forEach(function (v) { var o = el("option"); o.value = v; dl.appendChild(o); });
  }
  // Wire an input to a datalist + gentle formatter on blur.
  function autofill(input, listId, formatter, onCommit) {
    input.setAttribute("list", listId);
    input.setAttribute("autocomplete", "off");
    input.addEventListener("blur", function () {
      var before = input.value;
      var after = formatter(before);
      if (after !== before) { input.value = after; onCommit(after); }
      refreshDatalists();
    });
  }

  // Single best-match autocomplete (no datalist dropdown). Used for NAME fields,
  // where the pool is large and a long dropdown is noise. Shows one ghosted
  // completion; Tab/Enter/\u2192 or tapping the chip accepts it. Everything else
  // (blur formatting, commit) matches autofill() so it's a drop-in for names.
  function bestMatchAutofill(input, getPool, formatter, onCommit) {
    input.setAttribute("autocomplete", "off");
    input.setAttribute("autocorrect", "off");
    input.setAttribute("autocapitalize", "words");

    // wrap so we can float a suggestion chip under the field
    var chip = el("div", "bm-chip"); chip.style.display = "none";
    // insert chip right after the input in the DOM
    if (input.parentNode) input.parentNode.insertBefore(chip, input.nextSibling);

    var current = "";
    function best(val) {
      var v = (val || "").trim().toLowerCase();
      if (!v) return "";
      var pool = getPool();
      // prefer prefix matches, then substring; shortest wins as "best"
      var prefix = pool.filter(function (n) { return n.toLowerCase().indexOf(v) === 0; });
      var sub    = pool.filter(function (n) { return n.toLowerCase().indexOf(v) > 0; });
      var pick = (prefix[0] || sub[0] || "");
      // don't suggest what's already fully typed
      if (pick && pick.toLowerCase() === v) return "";
      return pick;
    }
    function show() {
      current = best(input.value);
      if (current) { chip.textContent = current; chip.style.display = ""; }
      else { chip.style.display = "none"; }
    }
    function accept() {
      if (!current) return;
      input.value = current; onCommit(current);
      current = ""; chip.style.display = "none";
    }
    chip.onclick = accept;
    input.addEventListener("input", show);
    input.addEventListener("focus", show);
    input.addEventListener("keydown", function (e) {
      if ((e.key === "Tab" || e.key === "Enter" || e.key === "ArrowRight") && current) {
        // ArrowRight only accepts when caret is at the end
        if (e.key === "ArrowRight" && input.selectionStart !== input.value.length) return;
        e.preventDefault(); accept();
      }
    });
    input.addEventListener("blur", function () {
      // small delay so a tap on the chip registers before it hides
      setTimeout(function () { chip.style.display = "none"; }, 150);
      var before = input.value;
      var after = formatter(before);
      if (after !== before) { input.value = after; onCommit(after); }
      refreshDatalists();
    });
  }
  function namePool() { return harvestSuggestions().names; }

  // ---------- hymn picker ----------
  function normalize(s){ return (s||'').toLowerCase().replace(/[^a-z0-9 ]/g,' ').replace(/\s+/g,' ').trim(); }
  function formatHymn(h){ return h.n + ': ' + h.t; }
  function hymnNumFromValue(v){ var m = (v||'').match(/^\s*(\d+)\b/); return m ? parseInt(m[1],10) : null; }

  var hpActive = null;
  var hpBook = 'all';

  function openHymnPicker(opts){
    hpActive = opts;
    hpBook = 'all';
    setActiveTab('all');
    var search = document.getElementById('hpSearch');
    document.getElementById('hpTitle').textContent = opts.title || 'Choose a hymn';
    search.value = '';
    document.getElementById('hpOverlay').classList.add('open');
    renderHymnList('');
    setTimeout(function(){ search.focus(); }, 60);
  }
  function closeHymnPicker(){
    document.getElementById('hpOverlay').classList.remove('open');
    hpActive = null;
  }
  function setActiveTab(book){
    var tabs = document.querySelectorAll('#hpTabs .hp-tab');
    for (var i=0;i<tabs.length;i++){
      if (tabs[i].getAttribute('data-book') === book) tabs[i].classList.add('active');
      else tabs[i].classList.remove('active');
    }
  }
  function renderHymnList(q){
    var list = document.getElementById('hpList');
    list.innerHTML = '';
    var pool = HYMNS.filter(function(h){ return hpBook === 'all' || h.b === hpBook; });
    var raw = (q||'').trim();
    var results;
    if (raw === ''){
      results = pool;
    } else if (/^\d+$/.test(raw)) {
      var num = parseInt(raw,10);
      var exact = pool.filter(function(h){ return h.n === num; });
      var prefix = pool.filter(function(h){ return h.n !== num && String(h.n).indexOf(raw) === 0; });
      results = exact.concat(prefix);
    } else {
      var terms = normalize(raw).split(' ').filter(Boolean);
      results = pool.filter(function(h){
        var nt = normalize(h.t);
        return terms.every(function(t){ return nt.indexOf(t) !== -1; });
      });
    }
    if (!results.length){
      list.appendChild(el('div','hp-empty','No hymn matches that.'));
      return;
    }
    results.slice(0, 80).forEach(function(h){
      var row = el('div','hp-row');
      row.appendChild(el('span','hp-num', String(h.n)));
      row.appendChild(el('span','hp-name', h.t));
      row.onclick = function(){
        if (hpActive && hpActive.set) hpActive.set(formatHymn(h));
        closeHymnPicker();
      };
      list.appendChild(row);
    });
  }
  document.getElementById('hpSearch').addEventListener('input', function(e){ renderHymnList(e.target.value); });
  document.getElementById('hpSearch').addEventListener('keydown', function(e){
    if (e.key === 'Enter'){ var f = document.querySelector('#hpList .hp-row'); if (f) f.click(); }
  });
  (function(){
    var tabs = document.querySelectorAll('#hpTabs .hp-tab');
    for (var i=0;i<tabs.length;i++){
      tabs[i].addEventListener('click', function(){
        hpBook = this.getAttribute('data-book');
        setActiveTab(hpBook);
        renderHymnList(document.getElementById('hpSearch').value);
      });
    }
  })();
  document.getElementById('hpCancel').onclick = closeHymnPicker;
  document.getElementById('hpOverlay').addEventListener('click', function(e){
    if (e.target === this) closeHymnPicker();
  });

  // ---------- state ----------
  var state = { weeks: [], bishopric: [], assignments: [], council: [], councilAssignments: [] };
  var currentSheet = null; // { type, data } for the open output sheet; drives PDF export
  var view = { tab: "sacrament", screen: "list", weekId: null, bmId: null };
  var archiveOpen = { sacrament: false, bishopric: false };

  // ---------- Supabase client ----------
  var sb = null;
  var currentUser = null;
  function configured() {
    return window.PFW_SUPABASE_URL &&
           window.PFW_SUPABASE_URL.indexOf("YOUR_SUPABASE") === -1 &&
           window.PFW_SUPABASE_ANON_KEY &&
           window.PFW_SUPABASE_ANON_KEY.indexOf("YOUR_SUPABASE") === -1;
  }
  function initSupabase() {
    if (sb || !configured() || !window.supabase) return;
    sb = window.supabase.createClient(window.PFW_SUPABASE_URL, window.PFW_SUPABASE_ANON_KEY);
  }

  function uid() {
    // Real UUID so every record has its permanent id at creation time.
    // This makes Supabase upserts idempotent and order-independent.
    if (window.crypto && window.crypto.randomUUID) return window.crypto.randomUUID();
    // fallback UUIDv4
    return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, function (c) {
      var r = (Math.random() * 16) | 0, v = c === "x" ? r : (r & 0x3) | 0x8;
      return v.toString(16);
    });
  }

  // ---------- sync status pill ----------
  var pillTimer = null;
  function pill(kind, text) {
    var p = document.getElementById("syncPill");
    if (!p) return;
    p.className = "sync-pill " + kind;
    p.textContent = text;
    if (pillTimer) clearTimeout(pillTimer);
    if (kind === "saved") {
      pillTimer = setTimeout(function () { p.className = "sync-pill hidden"; }, 1400);
    } else if (kind === "error") {
      // never let an error message stick forever across pages
      pillTimer = setTimeout(function () { p.className = "sync-pill hidden"; }, 3500);
    }
  }

  // ---------- LOAD: pull everything from Supabase into `state` ----------
  function load(cb) {
    if (!sb) { if (cb) cb(); return; }
    pill("saving", "loading\u2026");
    Promise.all([
      sb.from("sacrament_meetings").select("*"),
      sb.from("sacrament_speakers").select("*"),
      sb.from("sacrament_releases").select("*"),
      sb.from("sacrament_callings").select("*"),
      sb.from("bishopric_meetings").select("*"),
      sb.from("bishopric_counsel").select("*"),
      sb.from("bishopric_callings").select("*"),
      sb.from("assignments").select("*"),
      sb.from("council_meetings").select("*"),
      sb.from("council_counsel").select("*"),
      sb.from("council_assignments").select("*")
    ]).then(function (res) {
      var err = res.filter(function (r) { return r.error; })[0];
      if (err) { pill("error", "load failed"); console.error(err.error); if (cb) cb(err.error); return; }
      var d = res.map(function (r) { return r.data || []; });
      hydrate(d[0], d[1], d[2], d[3], d[4], d[5], d[6], d[7], d[8], d[9], d[10]);
      pill("saved", "loaded");
      if (cb) cb(null);
    }).catch(function (e) { pill("error", "load failed"); console.error(e); if (cb) cb(e); });
  }

  // map DB rows -> in-memory camelCase model the UI already uses
  function hydrate(sm, spk, rel, cal, bm, bc, bk, asg, cm, cc, casg) {
    function kids(rows, mid) { return rows.filter(function (x) { return x.meeting_id === mid; }).sort(function (a, b) { return (a.position||0)-(b.position||0); }); }
    state.weeks = (sm || []).map(function (m) {
      return {
        id: m.id, date: m.meeting_date, conducting: m.conducting || "",
        openingHymn: m.opening_hymn || "", sacramentHymn: m.sacrament_hymn || "",
        restHymn: m.rest_hymn || "", closingHymn: m.closing_hymn || "",
        invocation: m.invocation || "", benediction: m.benediction || "",
        musical: m.musical || "", blessings: m.blessings || "",
        youthSpeaker: m.youth_speaker || "", youthTopic: m.youth_topic || "",
        youthShown: m.youth_shown !== false, testimony: !!m.testimony,
        announcements: m.announcements || "", showSacramentBlock: m.show_sacrament_block !== false,
        speakers: kids(spk, m.id).map(function (s) { return { id: s.id, name: s.name || "", topic: s.topic || "" }; }),
        releases: kids(rel, m.id).map(function (s) { return { id: s.id, name: s.name || "", calling: s.calling || "" }; }),
        callings: kids(cal, m.id).map(function (s) { return { id: s.id, name: s.name || "", calling: s.calling || "" }; })
      };
    });
    // ensure at least the default two speaker rows for empty meetings
    state.weeks.forEach(function (w) { if (!w.speakers.length) w.speakers = [{ name:"", topic:"" }, { name:"", topic:"" }]; });

    state.bishopric = (bm || []).map(function (m) {
      return {
        id: m.id, date: m.meeting_date, moveins: m.moveins || "", ministering: m.ministering || "",
        ordinances: m.ordinances || "", notes: m.notes || "", sentAgenda: m.sent_agenda || null,
        lockSnapshot: m.lock_snapshot || null,
        counsel: kids(bc, m.id).map(function (s) { return { id: s.id, name: s.name || "", note: s.note || "" }; }),
        callings: kids(bk, m.id).map(function (s) { return { id: s.id, name: s.name || "", calling: s.calling || "", status: s.status || "consider" }; })
      };
    });
    state.assignments = (asg || []).map(function (a) {
      return { id: a.id, who: a.assignee || "", what: a.what || "", status: a.status || "open",
               dateMade: a.date_made, dateDone: a.date_done, meetingId: a.origin_meeting };
    });

    state.council = (cm || []).map(function (m) {
      return {
        id: m.id, date: m.meeting_date,
        moveins: m.moveins || "",
        instruction: m.instruction || "",
        live: m.live || "", care: m.care || "", invite: m.invite || "", unite: m.unite || "",
        coordination: m.coordination || "", notes: m.notes || "", sentAgenda: m.sent_agenda || null,
        lockSnapshot: m.lock_snapshot || null,
        counsel: kids(cc, m.id).map(function (s) { return { id: s.id, name: s.name || "", note: s.note || "" }; })
      };
    });
    state.councilAssignments = (casg || []).map(function (a) {
      return { id: a.id, who: a.assignee || "", what: a.what || "", status: a.status || "open",
               dateMade: a.date_made, dateDone: a.date_done, meetingId: a.origin_meeting };
    });
  }

  // ---------- SAVE: debounced full-state push to Supabase ----------
  var saveTimer = null;
  function save() {
    if (!sb) return;
    if (saveTimer) clearTimeout(saveTimer);
    pill("saving", "saving\u2026");
    saveTimer = setTimeout(pushAll, 700);
  }
  function isUuid(v) { return typeof v === "string" && /^[0-9a-f]{8}-/.test(v); }

  function pushAll(isRetry) {
    if (!sb || !currentUser) return;
    var owner = currentUser.id;
    // Build upsert payloads. Local-only ids (non-uuid) are dropped so Postgres
    // generates real uuids; we then reload to pick them up.
    var smRows = state.weeks.map(function (w) {
      var r = {
        owner: owner, meeting_date: w.date, conducting: w.conducting,
        opening_hymn: w.openingHymn, sacrament_hymn: w.sacramentHymn,
        rest_hymn: w.restHymn, closing_hymn: w.closingHymn,
        invocation: w.invocation, benediction: w.benediction,
        musical: w.musical, blessings: w.blessings,
        youth_speaker: w.youthSpeaker, youth_topic: w.youthTopic,
        youth_shown: w.youthShown, testimony: w.testimony,
        announcements: w.announcements, show_sacrament_block: w.showSacramentBlock,
        updated_at: new Date().toISOString()
      };
      if (isUuid(w.id)) r.id = w.id;
      return r;
    });
    var bmRows = state.bishopric.map(function (m) {
      var r = { owner: owner, meeting_date: m.date, moveins: m.moveins, ministering: m.ministering,
                ordinances: m.ordinances, notes: m.notes, sent_agenda: m.sentAgenda || null, lock_snapshot: m.lockSnapshot || null, updated_at: new Date().toISOString() };
      if (isUuid(m.id)) r.id = m.id;
      return r;
    });
    var cmRows = state.council.map(function (m) {
      var r = { owner: owner, meeting_date: m.date, moveins: m.moveins, instruction: m.instruction,
                live: m.live, care: m.care, invite: m.invite, unite: m.unite,
                coordination: m.coordination, notes: m.notes, sent_agenda: m.sentAgenda || null, lock_snapshot: m.lockSnapshot || null, updated_at: new Date().toISOString() };
      if (isUuid(m.id)) r.id = m.id;
      return r;
    });

    // meetings first (children need their ids), then reconcile children + assignments
    Promise.all([
      smRows.length ? sb.from("sacrament_meetings").upsert(smRows) : Promise.resolve({ error: null }),
      bmRows.length ? sb.from("bishopric_meetings").upsert(bmRows) : Promise.resolve({ error: null }),
      cmRows.length ? sb.from("council_meetings").upsert(cmRows) : Promise.resolve({ error: null })
    ]).then(function (r) {
      if (r[0].error || r[1].error || r[2].error) throw (r[0].error || r[1].error || r[2].error);
      // ids are stable client-generated UUIDs, so no reconciliation needed
      return pushChildren(owner);
    }).then(function () {
      pill("saved", "saved");
    }).catch(function (e) {
      console.error("save attempt failed:", e);
      var msg = (e && (e.message || e.hint || e.details || e.code)) ? String(e.message || e.code) : "unknown";
      lastSaveError = msg;
      // transient failures (network blips, a field losing focus mid-navigation)
      // are common; retry once quietly before surfacing an error.
      if (!isRetry) {
        setTimeout(function () { pushAll(true); }, 1200);
      } else {
        pill("error", "save failed: " + msg.slice(0, 60));
        // still keep trying in the background so data isn't lost
        setTimeout(function () { pushAll(true); }, 5000);
      }
    });
  }
  var lastSaveError = "";

  function pushChildren(owner) {
    var ops = [];
    // For each parent, delete its existing children then insert current ones.
    // Simple and correct for small data; keeps ordering via position.
    function childOps(table, parentField, parents, extract) {
      parents.forEach(function (p) {
        if (!isUuid(p.id)) return;
        ops.push(
          sb.from(table).delete().eq(parentField, p.id).then(function (delRes) {
            if (delRes && delRes.error) throw new Error(table + " delete: " + delRes.error.message);
            var rows = extract(p).map(function (row, idx) {
              var o = { owner: owner, position: idx };
              o[parentField] = p.id;
              return Object.assign(o, row);
            });
            if (!rows.length) return;
            return sb.from(table).insert(rows).then(function (insRes) {
              if (insRes && insRes.error) throw new Error(table + " insert: " + insRes.error.message);
            });
          })
        );
      });
    }
    childOps("sacrament_speakers", "meeting_id", state.weeks, function (w) {
      return (w.speakers || []).filter(function (s){return s.name||s.topic;}).map(function (s) { return { name: s.name, topic: s.topic }; });
    });
    childOps("sacrament_releases", "meeting_id", state.weeks, function (w) {
      return (w.releases || []).filter(function (s){return s.name||s.calling;}).map(function (s) { return { name: s.name, calling: s.calling }; });
    });
    childOps("sacrament_callings", "meeting_id", state.weeks, function (w) {
      return (w.callings || []).filter(function (s){return s.name||s.calling;}).map(function (s) { return { name: s.name, calling: s.calling }; });
    });
    childOps("bishopric_counsel", "meeting_id", state.bishopric, function (m) {
      return (m.counsel || []).filter(function (s){return s.name||s.note;}).map(function (s) { return { name: s.name, note: s.note }; });
    });
    childOps("bishopric_callings", "meeting_id", state.bishopric, function (m) {
      return (m.callings || []).filter(function (s){return s.name||s.calling;}).map(function (s) { return { name: s.name, calling: s.calling, status: s.status }; });
    });
    childOps("council_counsel", "meeting_id", state.council, function (m) {
      return (m.counsel || []).filter(function (s){return s.name||s.note;}).map(function (s) { return { name: s.name, note: s.note }; });
    });

    // assignments (flat, owner-scoped): upsert existing uuids, insert new
    var upAsg = [], inAsg = [];
    state.assignments.forEach(function (a) {
      var row = { owner: owner, assignee: a.who || "", what: a.what || "", status: a.status || "open",
                  date_made: a.dateMade || null, date_done: a.dateDone || null,
                  origin_meeting: isUuid(a.meetingId) ? a.meetingId : null };
      if (isUuid(a.id)) { row.id = a.id; upAsg.push(row); } else inAsg.push({ local: a, row: row });
    });
    if (upAsg.length) ops.push(sb.from("assignments").upsert(upAsg).then(function (res) {
      if (res && res.error) throw new Error("assignments upsert: " + res.error.message);
    }));
    inAsg.forEach(function (pair) {
      ops.push(sb.from("assignments").insert(pair.row).select().then(function (res) {
        if (res && res.error) throw new Error("assignments insert: " + res.error.message);
        if (res.data && res.data[0]) pair.local.id = res.data[0].id;
      }));
    });

    // council assignments (separate table, same pattern)
    var upCAsg = [], inCAsg = [];
    state.councilAssignments.forEach(function (a) {
      var row = { owner: owner, assignee: a.who || "", what: a.what || "", status: a.status || "open",
                  date_made: a.dateMade || null, date_done: a.dateDone || null,
                  origin_meeting: isUuid(a.meetingId) ? a.meetingId : null };
      if (isUuid(a.id)) { row.id = a.id; upCAsg.push(row); } else inCAsg.push({ local: a, row: row });
    });
    if (upCAsg.length) ops.push(sb.from("council_assignments").upsert(upCAsg).then(function (res) {
      if (res && res.error) throw new Error("council_assignments upsert: " + res.error.message);
    }));
    inCAsg.forEach(function (pair) {
      ops.push(sb.from("council_assignments").insert(pair.row).select().then(function (res) {
        if (res && res.error) throw new Error("council_assignments insert: " + res.error.message);
        if (res.data && res.data[0]) pair.local.id = res.data[0].id;
      }));
    });

    return Promise.all(ops);
  }

  // hard delete helpers (used by delete buttons) — remove from DB immediately
  function dbDelete(table, id) {
    if (sb && isUuid(id)) sb.from(table).delete().eq("id", id).then(function(){}, function(e){ console.error(e); });
  }

  // ----- bishopric meeting model -----
  function blankBishopric() {
    return {
      id: uid(),
      date: nextSundayISO(),
      moveins: "",
      counsel: [],        // [{id, name, note}]
      ministering: "",
      ordinances: "",
      callings: [],       // [{id, name, calling, status}]
      notes: "",
      sentAgenda: null    // ISO date the agenda was marked sent (the "locked" checkpoint)
    };
  }
  function findBishopric(id) { return state.bishopric.filter(function (m) { return m.id === id; })[0]; }

  // ----- assignments (global, carry forward until closed) -----
  function openAssignments() {
    return state.assignments.filter(function (a) { return a.status !== "done"; });
  }
  function assignmentsForMeeting(mId) {
    // open ones (carried) + any made in this meeting (even if done, so you can see closure)
    return state.assignments.filter(function (a) {
      return a.status !== "done" || a.meetingId === mId;
    });
  }
  function addAssignment(who, what, mId) {
    state.assignments.push({ id: uid(), who: who || "", what: what || "", dateMade: todayISO(), meetingId: mId, status: "open" });
    save();
  }
  function toggleAssignment(id) {
    var a = state.assignments.filter(function (x) { return x.id === id; })[0];
    if (a) { a.status = (a.status === "done") ? "open" : "done"; a.dateDone = (a.status === "done") ? todayISO() : null; save(); }
  }
  function deleteAssignment(id) {
    dbDelete("assignments", id);
    state.assignments = state.assignments.filter(function (x) { return x.id !== id; }); save();
  }
  function todayISO() { var d = new Date(); d.setHours(0,0,0,0); return d.toISOString().slice(0,10); }

  // ----- ward council meeting model -----
  // Structured around the Handbook (29.2.5): the council counsels together to
  // help members build spiritual strength, receive ordinances, keep covenants.
  // The middle is the four missions (Live / Care / Invite / Unite) as
  // coordination lanes, NOT round-robin auxiliary reports.
  function blankCouncil() {
    return {
      id: uid(),
      date: nextSundayISO(),
      moveins: "",         // new families / individuals into the ward
      instruction: "",     // bishop's focus / what to teach or center on
      counsel: [],         // [{id, name, note}] individuals & families
      live: "",            // Live the gospel
      care: "",            // Care for those in need
      invite: "",          // Invite all to receive the gospel (missionary)
      unite: "",           // Unite families for eternity (temple & family history)
      coordination: "",    // programs / activities / calendar
      notes: "",
      sentAgenda: null     // ISO date the agenda was marked sent
    };
  }
  function findCouncil(id) { return state.council.filter(function (m) { return m.id === id; })[0]; }

  // ----- council assignments (separate pool, same carry-forward behavior) -----
  function openCouncilAssignments() {
    return state.councilAssignments.filter(function (a) { return a.status !== "done"; });
  }
  function councilAssignmentsForMeeting(mId) {
    return state.councilAssignments.filter(function (a) {
      return a.status !== "done" || a.meetingId === mId;
    });
  }
  function addCouncilAssignment(who, what, mId) {
    state.councilAssignments.push({ id: uid(), who: who || "", what: what || "", dateMade: todayISO(), meetingId: mId, status: "open" });
    save();
  }
  function toggleCouncilAssignment(id) {
    var a = state.councilAssignments.filter(function (x) { return x.id === id; })[0];
    if (a) { a.status = (a.status === "done") ? "open" : "done"; a.dateDone = (a.status === "done") ? todayISO() : null; save(); }
  }
  function deleteCouncilAssignment(id) {
    dbDelete("council_assignments", id);
    state.councilAssignments = state.councilAssignments.filter(function (x) { return x.id !== id; }); save();
  }

  function blankWeek() {
    return {
      id: uid(),
      date: nextSundayISO(),
      conducting: "",
      openingHymn: "", sacramentHymn: "", restHymn: "", closingHymn: "",
      invocation: "", benediction: "",
      musical: "",
      blessings: "",
      speakers: [ { name: "", topic: "" }, { name: "", topic: "" } ],
      youthSpeaker: "", youthTopic: "", youthShown: true,
      testimony: false,
      releases: [], callings: [], announcements: "",
      showSacramentBlock: true
    };
  }
  function cloneSkeleton(w) {
    var c = blankWeek();
    c.conducting = w.conducting;
    c.openingHymn = w.openingHymn; c.sacramentHymn = w.sacramentHymn;
    c.restHymn = w.restHymn; c.closingHymn = w.closingHymn;
    return c;
  }
  function nextSundayISO() {
    var d = new Date(); d.setHours(0,0,0,0);
    var add = (7 - d.getDay()) % 7; if (add === 0) add = 7;
    d.setDate(d.getDate() + add);
    return d.toISOString().slice(0,10);
  }
  function fmtDate(iso) {
    if (!iso) return "-";
    var d = new Date(iso + "T12:00:00");
    return d.toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric", year: "numeric" });
  }
  function fmtShort(iso) {
    if (!iso) return "-";
    var d = new Date(iso + "T12:00:00");
    return d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
  }
  function isPast(iso) { return new Date(iso + "T23:59:59").getTime() < Date.now(); }
  function findWeek(id) { return state.weeks.filter(function (w) { return w.id === id; })[0]; }

  function render() {
    var app = document.getElementById("app");
    app.innerHTML = "";
    app.appendChild(header());
    // tab bar only shows on list screens
    if (view.screen === "list") app.appendChild(tabBar());
    if (view.tab === "bishopric") {
      if (view.screen === "list") renderBishopricList(app);
      else renderBishopricEditor(app);
    } else if (view.tab === "council") {
      if (view.screen === "list") renderCouncilList(app);
      else renderCouncilEditor(app);
    } else {
      if (view.screen === "list") renderList(app);
      else renderEditor(app);
    }
  }
  function header() {
    var top = el("div", "top");
    top.appendChild(el("h1", null, "Pioneer Farms"));
    top.appendChild(el("div", "sub", "ward operations"));
    return top;
  }
  function tabBar() {
    var bar = el("div", "tabs");
    var defs = [ ["sacrament", "Sacrament"], ["bishopric", "Bishopric"], ["council", "Ward Council"] ];
    defs.forEach(function (d) {
      var t = el("button", "tab" + (view.tab === d[0] ? " active" : ""), d[1]);
      t.onclick = function () { view = { tab: d[0], screen: "list" }; render(); };
      bar.appendChild(t);
    });
    return bar;
  }

  // collapsible archive section (shared by both tabs)
  function renderArchive(app, pastItems, tabKey, buildCard) {
    if (!pastItems.length) return;
    var toggle = el("button", "archive-toggle" + (archiveOpen[tabKey] ? " open" : ""));
    toggle.appendChild(el("span", "arch-chev", "\u25b8"));
    toggle.appendChild(el("span", null, "Archive"));
    toggle.appendChild(el("span", "arch-count", "(" + pastItems.length + ")"));
    toggle.appendChild(el("span", "arch-line"));
    var body = el("div", "archive-body" + (archiveOpen[tabKey] ? " open" : ""));
    pastItems.forEach(function (item) { body.appendChild(buildCard(item)); });
    toggle.onclick = function () {
      archiveOpen[tabKey] = !archiveOpen[tabKey];
      toggle.classList.toggle("open");
      body.classList.toggle("open");
    };
    app.appendChild(toggle);
    app.appendChild(body);
  }

  function renderList(app) {
    var head = el("div", "list-head");
    head.appendChild(el("span", "eyebrow", "Sacrament meetings"));
    var addBtn = el("button", "btn-ghost", "+ new week");
    addBtn.onclick = function () {
      var w = blankWeek();
      state.weeks.push(w); save();
      view = { tab: "sacrament", screen: "editor", weekId: w.id }; render();
    };
    head.appendChild(addBtn);
    app.appendChild(head);

    if (!state.weeks.length) {
      app.appendChild(el("div", "empty", "No meetings yet. Tap \u201c+ new week\u201d to plan one."));
      return;
    }
    var weeks = state.weeks.slice().sort(function (a, b) { return a.date.localeCompare(b.date); });
    var upcoming = weeks.filter(function (w) { return !isPast(w.date); });
    var past = weeks.filter(function (w) { return isPast(w.date); }).reverse();

    function buildWeekCard(w) {
      var card = el("div", "week-card");
      var when = el("div", "week-when");
      when.appendChild(el("div", "week-date", fmtShort(w.date)));
      var bits = [];
      if (w.conducting) bits.push(w.conducting.split(" ")[0] + " conducting");
      if (w.testimony) bits.push("testimony meeting");
      else {
        var named = (w.speakers || []).filter(function (s) { return s.name; }).length + (w.youthSpeaker ? 1 : 0);
        if (named) bits.push(named + " speaker" + (named === 1 ? "" : "s"));
      }
      when.appendChild(el("div", "week-meta", bits.join(" \u00b7 ") || "not filled in yet"));
      card.appendChild(when);
      card.appendChild(el("span", "week-tag" + (isPast(w.date) ? " past" : ""), isPast(w.date) ? "past" : "upcoming"));
      card.onclick = function () { view = { tab: "sacrament", screen: "editor", weekId: w.id }; render(); };
      return card;
    }

    if (!upcoming.length && !past.length) {
      // already handled by empty check above
    }
    if (!upcoming.length && past.length) {
      app.appendChild(el("div", "empty", "Nothing upcoming. Tap \u201c+ new week\u201d to plan one."));
    }
    upcoming.forEach(function (w) { app.appendChild(buildWeekCard(w)); });
    renderArchive(app, past, "sacrament", buildWeekCard);
  }

  // ---------- editor ----------
  function renderEditor(app) {
    var w = findWeek(view.weekId);
    if (!w) { view = { tab: "sacrament", screen: "list" }; return render(); }

    var back = el("button", "back-link", "\u2039 all meetings");
    back.onclick = function () { save(); view = { tab: "sacrament", screen: "list" }; render(); };
    app.appendChild(back);

    function bindText(field, key, opts) {
      opts = opts || {};
      var f = el("div", "field");
      f.appendChild(el("label", null, opts.label || key));
      var input;
      if (opts.area) { input = el("textarea"); if (opts.rows) input.rows = opts.rows; }
      else { input = el("input"); input.type = "text"; }
      input.value = w[key] || "";
      if (opts.placeholder) input.placeholder = opts.placeholder;
      input.oninput = function () { w[key] = input.value; save(); };
      f.appendChild(input);
      if (opts.hint) f.appendChild(el("div", "hint", opts.hint));
      field.appendChild(f);
      return f;
    }

    function bindHymn(field, key, opts) {
      opts = opts || {};
      var f = el("div", "field");
      f.appendChild(el("label", null, opts.label || key));
      var trigger = el("button", "hymn-trigger"); trigger.type = "button";
      var valSpan = el("span", "ht-val");
      var clearBtn = el("span", "ht-clear");
      var chev = el("span", "ht-chev", "\u25be");
      function paint() {
        var v = w[key] || "";
        if (v) { trigger.classList.remove("empty"); valSpan.textContent = v; clearBtn.textContent = "\u00d7"; }
        else { trigger.classList.add("empty"); valSpan.textContent = opts.placeholder || "tap to choose a hymn"; clearBtn.textContent = ""; }
      }
      trigger.onclick = function () {
        openHymnPicker({
          title: opts.label ? ("Choose " + opts.label) : "Choose a hymn",
          set: function (val) { w[key] = val; save(); paint(); }
        });
      };
      clearBtn.onclick = function (e) { e.stopPropagation(); if (w[key]) { w[key] = ""; save(); paint(); } };
      trigger.appendChild(valSpan); trigger.appendChild(clearBtn); trigger.appendChild(chev);
      f.appendChild(trigger);
      if (opts.hint) f.appendChild(el("div", "hint", opts.hint));
      paint();
      field.appendChild(f);
      return f;
    }

    function zoneHead(z, title, who, badgeText, badgeClass) {
      var zh = el("div", "zone-head");
      zh.appendChild(el("h2", null, title));
      if (who) zh.appendChild(el("span", "who", who));
      if (badgeText) zh.appendChild(el("span", "zone-badge " + badgeClass, badgeText));
      z.appendChild(zh);
    }

    // ===== This meeting =====
    var z0 = el("div", "zone");
    zoneHead(z0, "Sacrament Meeting");
    var df = el("div", "field");
    df.appendChild(el("label", null, "date"));
    var dinput = el("input"); dinput.type = "date"; dinput.value = w.date;
    dinput.onchange = function () { w.date = dinput.value; save(); };

  // ---- bishopric agenda (one page, assignments up top) ----
  function buildAgenda(m) {
    var isNew = newLineTester(m); // flags lines added after the agenda was locked
    var doc = document.createDocumentFragment();
    var cs = el("div", "cs");
    doc.appendChild(cs);
    cs.appendChild(el("div", "cs-title", "Bishopric Agenda"));
    cs.appendChild(el("div", "cs-sub", WARD));
    cs.appendChild(el("div", "cs-date", fmtDate(m.date)));

    // open assignments first
    var open = assignmentsForMeeting(m.id).filter(function (a) { return a.status !== "done"; });
    var sA = el("div", "cs-sec");
    sA.appendChild(el("div", "cs-h", "Open Assignments \u2014 Follow Up"));
    sA.appendChild(el("hr", "cs-hrule"));
    if (!open.length) {
      sA.appendChild(el("div", "cs-note", "None open. Clean slate."));
    } else {
      open.forEach(function (a) {
        var line = el("div", "cs-checkline");
        if (isNew("A|" + (a.who||"") + "|" + a.what)) line.classList.add("is-new");
        line.appendChild(el("span", "cs-box", "\u25a1"));
        var t = el("span");
        if (a.who) { t.appendChild(el("strong", null, a.who + ": ")); }
        t.appendChild(document.createTextNode(a.what + "  "));
        t.appendChild(el("span", "cs-topic", "(since " + fmtShort(a.dateMade) + ")"));
        line.appendChild(t);
        sA.appendChild(line);
      });
    }
    cs.appendChild(sA);

    // move-ins
    if (m.moveins) {
      var sMI = el("div", "cs-sec");
      sMI.appendChild(el("div", "cs-h", "Move-ins"));
      sMI.appendChild(el("hr", "cs-hrule"));
      lines(m.moveins).forEach(function (l) {
        var line = el("div", "cs-checkline");
        if (isNew("MI|" + l)) line.classList.add("is-new");
        line.appendChild(el("span", "cs-box", "\u25a1"));
        line.appendChild(el("span", null, l));
        sMI.appendChild(line);
      });
      cs.appendChild(sMI);
    }

    // counsel together

  // ---- follow-up sheet (organized by person) ----
  function buildFollowUp(m) {
    var doc = document.createDocumentFragment();
    var cs = el("div", "cs");
    doc.appendChild(cs);
    cs.appendChild(el("div", "cs-title", "Assignments \u2014 Follow-Up"));
    cs.appendChild(el("div", "cs-sub", WARD + "  \u00b7  from meeting " + fmtShort(m.date)));
    cs.appendChild(el("div", "cs-date", "Sent " + fmtDate(todayISO())));

    // gather all still-open assignments, group by person
    var open = openAssignments();
    if (!open.length) {
      cs.appendChild(el("div", "cs-note", "No open assignments. Everything\u2019s closed out \u2014 nice work."));
      var w0 = el("div"); w0.appendChild(doc); return w0;
    }
    var byPerson = {};
    var order = [];
    open.forEach(function (a) {
      var key = a.who && a.who.trim() ? a.who.trim() : "Unassigned";
      if (!byPerson[key]) { byPerson[key] = []; order.push(key); }
      byPerson[key].push(a);
    });
    order.sort(function (a, b) { if (a === "Unassigned") return 1; if (b === "Unassigned") return -1; return a.localeCompare(b); });

    order.forEach(function (name) {
      var block = el("div", "fu-person");

        else { t.appendChild(document.createTextNode("  ")); t.appendChild(el("span", "cs-topic", "(since " + fmtShort(a.dateMade) + ")")); }
        item.appendChild(t);
        block.appendChild(item);
      });
      cs.appendChild(block);
    });

    var wrap = el("div"); wrap.appendChild(doc); return wrap;
  }


  // ================= WARD COUNCIL =================
  // Handbook 29.2.5: the council counsels together about God's work of
  // salvation and exaltation. Built deliberately to resist status-reporting:
  // the spine is carried-forward assignments + individuals/families to counsel
  // about, and the middle is the four missions as coordination lanes.
  var COUNCIL_MISSIONS = [
    { key: "live",   title: "Live the gospel",            hint: "faith, worship, teaching, keeping covenants" },
    { key: "care",   title: "Care for those in need",     hint: "welfare, ministering, self-reliance \u2014 names + status, no sensitive detail" },
    { key: "invite", title: "Invite all to receive the gospel", hint: "missionary work, new & returning members, friends being taught" },
    { key: "unite",  title: "Unite families for eternity", hint: "temple & family history, temple prep, ordinances" }
  ];

  function renderCouncilList(app) {
    var head = el("div", "list-head");
    head.appendChild(el("span", "eyebrow", "Ward council meetings"));
    var addBtn = el("button", "btn-ghost", "+ new meeting");
    addBtn.onclick = function () {
      var m = blankCouncil();
      state.council.push(m); save();
      view = { tab: "council", screen: "editor", cmId: m.id }; render();
    };
    head.appendChild(addBtn);
    app.appendChild(head);

    var open = openCouncilAssignments();
    if (open.length) {
      var banner = el("div", "week-card");
      banner.style.cssText = "cursor:pointer;border-color:var(--accent);background:var(--accent-soft);";
      var bw = el("div", "week-when");
      bw.appendChild(el("div", "week-date", open.length + " open assignment" + (open.length === 1 ? "" : "s")));
      bw.appendChild(el("div", "week-meta", "tap to review \u00b7 carried until closed"));

      banner.appendChild(el("span", "week-tag", "review \u203a"));

    }

    if (!state.council.length) {
      app.appendChild(el("div", "empty", "No ward council meetings yet. Tap \u201c+ new meeting\u201d to start."));
      return;
    }
    var mtgs = state.council.slice().sort(function (a, b) { return a.date.localeCompare(b.date); });
    var upcoming = mtgs.filter(function (m) { return !isPast(m.date); });
    var past = mtgs.filter(function (m) { return isPast(m.date); }).reverse();

    function buildMtgCard(m) {
      var card = el("div", "week-card");
      var when = el("div", "week-when");
      when.appendChild(el("div", "week-date", fmtShort(m.date)));
      var bits = [];
      var made = state.councilAssignments.filter(function (a) { return a.meetingId === m.id; }).length;
      if (made) bits.push(made + " assignment" + (made === 1 ? "" : "s") + " made");
      if ((m.counsel || []).length) bits.push((m.counsel.length) + " to counsel");

      card.appendChild(when);
      var tagWrap = el("div"); tagWrap.style.cssText = "display:flex;flex-direction:column;gap:4px;align-items:flex-end;";
      tagWrap.appendChild(el("span", "week-tag" + (isPast(m.date) ? " past" : ""), isPast(m.date) ? "past" : "upcoming"));
      if (m.sentAgenda) tagWrap.appendChild(el("span", "week-tag sent-tag", "sent \u2713"));
      card.appendChild(tagWrap);
      card.onclick = function () { view = { tab: "council", screen: "editor", cmId: m.id }; render(); };
      return card;
    }

    if (!upcoming.length && past.length) {
      app.appendChild(el("div", "empty", "Nothing upcoming. Tap \u201c+ new meeting\u201d to start."));
    }
    upcoming.forEach(function (m) { app.appendChild(buildMtgCard(m)); });
    renderArchive(app, past, "council", buildMtgCard);
  }

  function renderCouncilEditor(app) {
    var m = findCouncil(view.cmId);
    if (!m) { view = { tab: "council", screen: "list" }; return render(); }

    var back = el("button", "back-link", "\u2039 all meetings");
    back.onclick = function () { save(); view = { tab: "council", screen: "list" }; render(); };
    app.appendChild(back);

    function zoneHead(z, title, who, badgeText, badgeClass) {
      var zh = el("div", "zone-head");

      var input = opts.area ? el("textarea") : el("input");
      if (!opts.area) input.type = "text";
      if (opts.area && opts.rows) input.rows = opts.rows;
      input.value = getVal() || "";
      if (opts.placeholder) input.placeholder = opts.placeholder;
      input.oninput = function () { setVal(input.value); save(); };
      f.appendChild(input);
      if (opts.hint) f.appendChild(el("div", "hint", opts.hint));

    var zA = el("div", "zone");
    zoneHead(zA, "Assignments", "carried until done");
    var list = councilAssignmentsForMeeting(m.id).sort(function (a, b) {
      if ((a.status === "done") !== (b.status === "done")) return a.status === "done" ? 1 : -1;
      return (a.dateMade || "").localeCompare(b.dateMade || "");
    });
    if (!list.length) {
      zA.appendChild(el("div", "hint", "No open assignments. Add the first below \u2014 it\u2019ll carry to every meeting until you check it done."));
    }
    list.forEach(function (a) {
      var row = el("div", "asg" + (a.status === "done" ? " done" : ""));

      chk.onclick = function () { toggleCouncilAssignment(a.id); render(); };
      row.appendChild(chk);
      var body = el("div", "asg-body");
      body.appendChild(el("div", "asg-what", a.what || "(no description)"));
      var meta = [];
      if (a.who) meta.push(a.who);
      meta.push("since " + fmtShort(a.dateMade));
      body.appendChild(el("div", "asg-meta", meta.join(" \u00b7 ")));

      var del = el("button", "asg-del", "\u00d7");

    whoIn.style.cssText = "font-size:16px;border:1px solid var(--rule);border-radius:8px;padding:9px 11px;-webkit-appearance:none;";
    whoIn.setAttribute("list", "dl-council-assignees"); whoIn.setAttribute("autocomplete", "off");

    var addBtn = el("button", "btn", "Add");
    addBtn.classList.add("asg-add-full");
    addBtn.onclick = function () {

      addCouncilAssignment(whoIn.value.trim(), whatIn.value.trim(), m.id);
      render();
    };
    addWrap.appendChild(whoIn); addWrap.appendChild(whatIn); addWrap.appendChild(addBtn);
    zA.appendChild(addWrap);
    app.appendChild(zA);

    // ===== MOVE-INS =====
    var zMI = el("div", "zone");
    zoneHead(zMI, "Move-ins");
    textField(zMI, function () { return m.moveins; }, function (v) { m.moveins = v; }, { area: true, rows: 2, hint: "new members / families \u2014 welcome, fold into auxiliaries \u2014 one per line" });
    app.appendChild(zMI);

    // ===== INSTRUCTION / FOCUS =====
    var zI = el("div", "zone");
    zoneHead(zI, "Instruction & focus", "set the direction");
    textField(zI, function () { return m.instruction; }, function (v) { m.instruction = v; }, { area: true, rows: 2, hint: "what to teach or center the council on \u2014 a scripture, a handbook item, one priority" });
    app.appendChild(zI);

    // ===== COUNSEL TOGETHER =====
    var zC = el("div", "zone");
    zoneHead(zC, "Counsel together", "who needs us");
    zC.appendChild(el("div", "hint", "Individuals and families the council should counsel about. Names and a short note \u2014 not sensitive detail."));
    (m.counsel || []).forEach(function (c, i) {
      var row = el("div", "counsel-row");
      var nf = el("div", "field"); nf.style.marginBottom = "6px";
      nf.appendChild(el("label", null, "name"));
      var ni = el("input"); ni.type = "text"; ni.value = c.name || "";
      ni.oninput = function () { c.name = ni.value; save(); };
      bestMatchAutofill(ni, namePool, gentleName, function (v) { c.name = v; save(); });
      nf.appendChild(ni); row.appendChild(nf);
      var notef = el("div", "field"); notef.style.marginBottom = "0";
      notef.appendChild(el("label", null, "note"));
      var noti = el("input"); noti.type = "text"; noti.value = c.note || "";
      noti.oninput = function () { c.note = noti.value; save(); };
      notef.appendChild(noti); row.appendChild(notef);
      var rm = el("button", "danger", "remove");
      rm.onclick = function () { m.counsel.splice(i, 1); save(); render(); };
      row.appendChild(rm);
      zC.appendChild(row);
    });
    var addC = el("button", "add-line", "+ add person / family");
    addC.onclick = function () { if (!m.counsel) m.counsel = []; m.counsel.push({ id: uid(), name: "", note: "" }); save(); render(); };
    zC.appendChild(addC);
    app.appendChild(zC);

    // ===== THE WORK OF SALVATION & EXALTATION (four missions) =====
    var zW = el("div", "zone");
    zoneHead(zW, "Work of salvation & exaltation", "coordinate, don\u2019t report");
    zW.appendChild(el("div", "hint", "Coordination across the four missions of the Church \u2014 what the council is doing together, not organization-by-organization status."));
    COUNCIL_MISSIONS.forEach(function (mi) {
      zW.appendChild(el("div", "sub-label", mi.title));
      textField(zW, function () { return m[mi.key]; }, function (v) { m[mi.key] = v; }, { area: true, rows: 2, hint: mi.hint });
    });
    app.appendChild(zW);

    // ===== COORDINATION & CALENDAR =====
    var zCo = el("div", "zone");
    zoneHead(zCo, "Coordination & calendar");
    textField(zCo, function () { return m.coordination; }, function (v) { m.coordination = v; }, { area: true, rows: 2, hint: "programs, activities, upcoming dates \u2014 one per line" });
    app.appendChild(zCo);

    // ===== NOTES =====
    var zN = el("div", "zone");
    zoneHead(zN, "Notes & instruction");
    textField(zN, function () { return m.notes; }, function (v) { m.notes = v; }, { area: true, rows: 3, hint: "open notes" });
    app.appendChild(zN);

    // ===== outputs =====
    var out = el("div", "out-bar");
    var b1 = el("button", "btn", "Agenda");
    b1.onclick = function () { currentSheet = { type: "council-agenda", data: m }; openSheet(buildCouncilAgenda(m)); };
    var b2 = el("button", "btn secondary", m.sentAgenda ? "Follow-up \u2192" : "Follow-up");

    out.appendChild(b1); out.appendChild(b2);
    app.appendChild(out);
    app.appendChild(sentStatusBar(m, "council"));

    var del = el("button", "danger", "delete this meeting");
    del.style.cssText += "display:block;margin:14px auto 0;";

        state.council = state.council.filter(function (x) { return x.id !== m.id; });
        save(); view = { tab: "council", screen: "list" }; render(); return;
      }
      del.dataset.armed = "1"; del.textContent = "tap again to delete";
      setTimeout(function () { if (del) { del.dataset.armed = "0"; del.textContent = "delete this meeting"; } }, 2500);
    };
    app.appendChild(del);
  }

  // ---- ward council agenda (one page, assignments up top) ----
  function buildCouncilAgenda(m) {

  function bishopricAgendaLines(m) {

    lines(m.moveins).forEach(function (l) { out.push("MI|" + l); });

    lines(m.notes).forEach(function (l) { out.push("N|" + l); });

  // Before printing a pair view, build a plain stacked print-only container.

    if (!track) return; // single-doc view prints fine as-is
    var pages = track.querySelectorAll(".pair-page .doc");
    if (!pages.length) return;

    holder.id = "printFlat";
    for (var i = 0; i < pages.length; i++) {
      var pg = document.createElement("div");

  // Build a clean, print-styled clone of a sheet node for PDF capture: white

  // Hand a finished jsPDF to the user: native share on iPhone, reliable

                 (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
    var canShareFiles = navigator.canShare && navigator.canShare({ files: [file] });

  // Draw the sacrament program as real text (the "Option C" formal layout):
  // church-name eyebrow, serif title, ward, date, framed dotted-leader rows.
  function drawProgramPdf(pdf, w) {
    var PW = pdf.internal.pageSize.getWidth();
    var cx = PW / 2;
    var left = 79, right = PW - 79;      // ~1.1in
    var INK = "#1b2a3a", MUT = "#6b7683", RULE = "#c9ced4";

    var rows = [];
    function add(label, val) { if (val) rows.push([label, val]); }
