    add("Closing Hymn", hymnClean(w.closingHymn));
    add("Benediction", w.benediction);

    pdf.setDrawColor(INK); pdf.setLineWidth(2);
    pdf.line(left, 61, right, 61);

    var y = 85;
    pdf.setTextColor(MUT); pdf.setFont("helvetica", "normal"); pdf.setFontSize(8.5);
    pdf.text("THE CHURCH OF JESUS CHRIST OF LATTER-DAY SAINTS", cx, y, { align: "center", charSpace: 1.6 });
    y += 30;
    pdf.setTextColor(INK); pdf.setFont("times", "bold"); pdf.setFontSize(26);
    pdf.text("Sacrament Meeting", cx, y, { align: "center" });
    y += 22;
    pdf.setFont("times", "italic"); pdf.setFontSize(14);
    pdf.text(WARD, cx, y, { align: "center" });
    y += 17;
    pdf.setTextColor(MUT); pdf.setFont("helvetica", "normal"); pdf.setFontSize(10);
    pdf.text(fmtDate(w.date), cx, y, { align: "center" });
    y += 13;
    pdf.setDrawColor(INK); pdf.setLineWidth(2);
    pdf.line(left, y, right, y);

    y += 34;
    var lx = 101, vx = PW - 101; // ~1.4in
    rows.forEach(function (r) {
      var lab = r[0], val = r[1];
      pdf.setTextColor(INK); pdf.setFont("helvetica", "bold"); pdf.setFontSize(11);
      pdf.text(lab, lx, y);
      var lw = pdf.getTextWidth(lab);
      pdf.setFont("times", "normal"); pdf.setFontSize(12.5);
      pdf.text(val, vx, y, { align: "right" });
      var rw = pdf.getTextWidth(val);
      pdf.setDrawColor(RULE); pdf.setLineWidth(0.4);
      pdf.setLineDashPattern([1, 3], 0);
      pdf.line(lx + lw + 6, y - 3, vx - rw - 6, y - 3);
      pdf.setLineDashPattern([], 0);
      y += 27;

    pdf.setDrawColor(INK); pdf.setLineWidth(2);
    pdf.line(left, y - 4, right, y - 4);
  }

      // so it looks like an actual printed program when sent to the ward.
      if (currentSheet && currentSheet.type === "program" && currentSheet.data) {
        var ppdf = new jsPDF({ unit: "pt", format: "letter" });
        drawProgramPdf(ppdf, currentSheet.data);
        await deliverPdf(ppdf, programPdfName(currentSheet.data));
        return;
      }

      var pdf = new jsPDF({ unit: "pt", format: "letter" });
      var pw = pdf.internal.pageSize.getWidth();
      var ph = pdf.internal.pageSize.getHeight();
      var margin = 36; // 0.5in
      var availW = pw - margin * 2;
      var availH = ph - margin * 2;
      for (var i = 0; i < nodes.length; i++) {
        var temp = pdfRenderClone(nodes[i]);
        var canvas = await html2canvas(temp, { scale: 2, backgroundColor: "#ffffff", useCORS: true });
        temp.parentNode.removeChild(temp);
        var img = canvas.toDataURL("image/png");
        if (i > 0) pdf.addPage();

        // Width-fit height (what it'd be if we filled the page width).
        var widthFitH = canvas.height * (availW / canvas.width);

        if (widthFitH <= availH) {
          // Fits on one page: scale to fit, centered, so a short program never
          // spills. Constrain by whichever dimension is limiting.
          var scale = Math.min(availW / canvas.width, availH / canvas.height);
          var w = canvas.width * scale;
          var h = canvas.height * scale;
          pdf.addImage(img, "PNG", (pw - w) / 2, margin, w, h);
        } else {
          // Genuinely taller than one page (e.g. a long conducting brief):
          // fill width and slice across pages at page-height boundaries.
          var pxPerPt = canvas.width / availW;
          var sliceH = availH;
          var remaining = widthFitH, srcY = 0, first = true;
          while (remaining > 0.5) {
            if (!first) pdf.addPage();
            first = false;
            var thisH = Math.min(sliceH, remaining);
            var sCanvas = document.createElement("canvas");
            sCanvas.width = canvas.width;
            sCanvas.height = Math.round(thisH * pxPerPt);
            var ctx = sCanvas.getContext("2d");
            ctx.fillStyle = "#fff"; ctx.fillRect(0, 0, sCanvas.width, sCanvas.height);
            ctx.drawImage(canvas, 0, Math.round(srcY * pxPerPt), canvas.width, sCanvas.height, 0, 0, canvas.width, sCanvas.height);
            pdf.addImage(sCanvas.toDataURL("image/png"), "PNG", margin, margin, availW, thisH);
            srcY += thisH; remaining -= thisH;
          }
        }
      }
      var name = sheetPdfName();
      await deliverPdf(pdf, name);
    } catch (e) {
      console.error("PDF export failed:", e);
      if (e && e.name !== "AbortError") alert("Couldn\u2019t build the PDF. " + (e.message || ""));
    } finally {
      btn.textContent = label; btn.disabled = false;
    }
  }
  document.getElementById("sheetPdf").onclick = exportSheetPdf;

  // ================= AUTH / BOOT =================
  function renderLogin(msg, msgKind) {
    var app = document.getElementById("app");
    app.innerHTML = "";
    document.getElementById("syncPill").className = "sync-pill hidden";

    var wrap = el("div", "login-wrap");
    wrap.appendChild(el("h1", "login-logo", "Pioneer Farms"));
    wrap.appendChild(el("div", "login-sub", "ward operations"));

    var card = el("div", "login-card");
    if (!configured()) {
      card.appendChild(el("div", "login-config-warn",
        "Supabase isn\u2019t configured yet. Paste your project URL and anon key into the CONFIG block near the top of index.html, then reload."));
    }
    card.appendChild(el("label", null, "email"));
    var email = el("input"); email.type = "email"; email.autocapitalize = "off"; email.autocomplete = "username";
    card.appendChild(email);
    card.appendChild(el("label", null, "password"));
    var pass = el("input"); pass.type = "password"; pass.autocomplete = "current-password";
    card.appendChild(pass);
    var btn = el("button", "login-btn", "Sign in");
    var msgEl = el("div", "login-msg" + (msgKind ? " " + msgKind : ""), msg || "");

    function attempt() {
      if (!configured()) { msgEl.className = "login-msg err"; msgEl.textContent = "Add your Supabase keys first."; return; }
      initSupabase();
      btn.disabled = true; msgEl.className = "login-msg"; msgEl.textContent = "Signing in\u2026";
      sb.auth.signInWithPassword({ email: email.value.trim(), password: pass.value }).then(function (r) {
        btn.disabled = false;
        if (r.error) { msgEl.className = "login-msg err"; msgEl.textContent = r.error.message; return; }
        currentUser = r.data.user;
        bootApp();
      });
    }
    btn.onclick = attempt;
    pass.onkeydown = function (e) { if (e.key === "Enter") attempt(); };

    card.appendChild(btn);
    card.appendChild(msgEl);
    wrap.appendChild(card);
    app.appendChild(wrap);
    setTimeout(function () { email.focus(); }, 60);
  }

  function bootApp() {
    view = { tab: "sacrament", screen: "list" };
    load(function (err) {
      render();
      // append a sign-out affordance under the list
      addSignOut();
    });
  }
  function addSignOut() {
    if (document.getElementById("pfwSignOut")) return;
    var so = el("button", "signout-link", "sign out");
    so.id = "pfwSignOut";
    so.onclick = function () {
      if (sb) sb.auth.signOut().then(function () { currentUser = null; state = { weeks: [], bishopric: [], assignments: [] }; renderLogin("Signed out.", "ok"); });
    };
    document.getElementById("app").appendChild(so);
    if (!document.getElementById("pfwVersion")) {
      var ver = el("div", null, APP_VERSION);
      ver.id = "pfwVersion";
      ver.style.cssText = "text-align:center;color:var(--faint);font-family:var(--mono);font-size:9px;letter-spacing:.1em;margin:6px 0 20px;";
      document.getElementById("app").appendChild(ver);
    }
  }

  // wrap render() so sign-out link persists on list screens
  var _render = render;
  render = function () {
    _render();
    if (currentUser) refreshDatalists();
    if (currentUser && view.screen === "list") { var so = document.getElementById("pfwSignOut"); if (so) document.getElementById("app").appendChild(so); else addSignOut(); }
  };

  // Re-fetch from the cloud when returning to the app, so changes made on
  // another device (iPad <-> phone) show up. Guarded so it never clobbers
  // an in-progress edit: only refreshes on the list screen, and never while
  // a save is pending.
  var lastRefresh = 0;
  function refreshFromCloud() {
    if (!sb || !currentUser) return;
    if (view.screen !== "list") return;        // don't wipe an open editor
    if (saveTimer) return;                       // a save is queued; skip
    var now = Date.now();
    if (now - lastRefresh < 3000) return;        // throttle
    lastRefresh = now;
    load(function (err) { if (!err) render(); });
  }
  document.addEventListener("visibilitychange", function () {
    if (document.visibilityState === "visible") refreshFromCloud();
  });
  window.addEventListener("focus", refreshFromCloud);
  window.addEventListener("pageshow", function () { refreshFromCloud(); });

  // startup: restore session if present, else show login
  (function start() {
    if (!configured()) { renderLogin(); return; }
    initSupabase();
    sb.auth.getSession().then(function (r) {
      if (r.data && r.data.session) { currentUser = r.data.session.user; bootApp(); }
      else renderLogin();
    }).catch(function () { renderLogin(); });
  })();
})();
</script>
